<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Zip Gallery</title>
        <style>
            *,
            *:after,
            *:before {
                box-sizing: border-box;
            }
            html,
            body {
                width: 100%;
                height: 100%;
                padding: 0;
                margin: 0;
            }
            #control {
                width: 100%;
                height: 50px;
                border-bottom: 1px solid #999;
            }
            #file-input {
                width: 100%;
                height: 100%;
            }
            #gallery {
                width: 100%;
                height: calc(100% - 50px);
                background-position: center;
                background-size: contain;
                background-repeat: no-repeat;
            }
            #info {
                position: fixed;
                top: 15px;
                right: 15px;
                font-size: 24px;
            }
        </style>
    </head>
    <body>
        <div id="control">
            <input type="file" id="file-input" />
        </div>
        <div id="gallery"></div>
        <div id="info"></div>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
        <script>
            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1))
                    ;[array[i], array[j]] = [array[j], array[i]]
                }
            }
            window.addEventListener('load', () => {
                const controlElem = document.querySelector('#control')
                const fileElem = document.querySelector('#file-input')
                const galleryElem = document.querySelector('#gallery')
                const infoElem = document.querySelector('#info')
                let files = []
                let fileIndex = 0
                function showFile() {
                    const file = files[fileIndex]
                    infoElem.innerText = `${fileIndex + 1}/${files.length}`
                    file.async('arraybuffer').then((content) => {
                        const blob = new Blob([content], { type: 'image/png' })
                        const url = URL.createObjectURL(blob)
                        const img = new Image()
                        img.onload = () => (galleryElem.style.backgroundImage = `url(${url})`)
                        img.src = url
                    })
                }
                fileElem.addEventListener('change', async (e) => {
                    if (!e.target.files || e.target.files.length === 0) {
                        return
                    }
                    const zipFile = e.target.files[0]
                    const zipName = zipFile.name.replace(/\.zip$/, '')
                    const zip = await JSZip.loadAsync(zipFile)
                    files = []
                    fileIndex = 0
                    Object.keys(zip.files).forEach((fileName) => {
                        if (!fileName.match(new RegExp(`^${zipName}/.+\\.(jpe?g|png|gif)$`, 'i'))) {
                            return
                        }
                        const file = zip.files[fileName]
                        files.push(file)
                    })
                    shuffleArray(files)
                    showFile()
                    controlElem.remove()
                })
                galleryElem.addEventListener('click', (e) => {
                    if (files.length === 0) {
                        return
                    }
                    const x = e.pageX
                    fileIndex = (files.length + fileIndex + (x < window.innerWidth / 2 ? -1 : +1)) % files.length
                    showFile()
                })
            })
        </script>
    </body>
</html>
