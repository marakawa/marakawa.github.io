<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Texture</title>
        <style>
            input[type='number'] {
                width: 80px;
            }
            #canvases {
                position: relative;
                display: flex;
                flex-wrap: wrap;
            }
            #canvases > * {
                width: 48%;
                margin-right: 1%;
            }
            #canvases canvas {
                display: block;
                cursor: pointer;
                border: 1px solid #999;
            }
        </style>
    </head>
    <body>
        <form id="control-form">
            <div>
                <span>size</span>
                <input type="number" name="size" value="720" />
            </div>
            <div>
                <span>bg line width</span>
                <input type="number" name="back" value="3" />
                <span>line width</span>
                <input type="number" name="fore" value="3" />
            </div>
            <div>
                <span>bg</span>
                <input type="color" name="backcolor" value="#ffffff" />
                <span>line</span>
                <input type="color" name="forecolor" value="#000000" />
                <span>invert</span>
                <input type="checkbox" name="invert" />
            </div>
            <div>
                <textarea id="text-input" name="text" placeholder="T-Shirt Text"></textarea>
            </div>
            <div>
                <span>image</span>
                <input id="image-input" type="file" name="image" />
            </div>
            <div>
                <span>sub mode</span>
                <input type="checkbox" name="sub" />
                <button type="submit">Update</button>
            </div>
        </form>
        <hr />
        <div id="canvases"></div>
        <script type="module" src="texture.ts"></script>
    </body>
</html>
