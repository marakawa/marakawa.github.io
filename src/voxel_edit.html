<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Voxel Edit</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                color: #fff;
                background-color: #666666;
            }
            canvas {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
            button {
                width: 50px;
                height: 50px;
                font-size: 16px;
                z-index: 10;
            }
            .controls {
                position: fixed;
                left: 50%;
                transform: translate(-50%, 0);
                white-space: nowrap;
            }
            .controls--top {
                top: 15px;
            }
            .controls--bottom {
                bottom: 15px;
            }
        </style>
    </head>
    <body bgcolor="#666666" text="#ffffff">
        <div class="container"></div>
        <div class="controls controls--top">
            <button class="undo-btn">U</button>
            <button class="redo-btn">R</button>
            <button class="reset-btn">!</button>
            <br />
            <button class="front-btn">F</button>
            <button class="side-btn">S</button>
            <button class="top-btn">T</button>
        </div>
        <div class="controls controls--bottom">
            <button class="color1-btn">1</button>
            <button class="color2-btn">2</button>
            <button class="color3-btn">3</button>
            <button class="color4-btn">4</button>
            <br />
            <button class="paint-btn">P</button>
            <button class="add-btn">+</button>
            <button class="remove-btn">-</button>
            <button class="remove-line-btn">-*</button>
        </div>
        <script type="module" src="./voxel_edit.ts"></script>
    </body>
</html>
