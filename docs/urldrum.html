<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>urldrum</title>
        <style>
            *,
            *:after,
            *:before {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                padding: 0;
            }
            .play-btn {
                width: 50px;
                height: 50px;
            }
            .grid {
                overflow-x: auto;
            }
            .grid__line {
                white-space: nowrap;
                display: flex;
                width: calc(50px * 64 + 100px);
            }
            .grid__synth-id {
                width: 100px;
                height: 50px;
                display: inline-flex;
                align-items: center;
            }
            .grid__cell {
                width: 50px;
                height: 50px;
                margin: 0;
                padding: 0;
                display: inline-block;
            }
            .grid__line .grid__cell:nth-of-type(4n + 1) {
                box-shadow: 0 0 10px #0ff inset;
            }
            .grid__line .grid__cell:nth-of-type(16n + 1) {
                box-shadow: 0 0 10px #00f inset;
            }
        </style>
    </head>
    <body>
        <button class="play-btn">▶️</button>
        <div class="grid"></div>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
        <script>
            window.addEventListener('load', () => {
                const synths = {
                    marimba: new Tone.PolySynth().toDestination(),
                    hihat: new Tone.NoiseSynth({
                        type: 'brown',
                        envelope: {
                            attack: 0.001,
                            decay: 0.02,
                            sustain: 0,
                        },
                    }).toDestination(),
                    snare: new Tone.NoiseSynth({
                        envelope: {
                            attack: 0.001,
                            decay: 0.2,
                            sustain: 0,
                        },
                    }).toDestination(),
                    kick: new Tone.MembraneSynth().toDestination(),
                }
                class Cell {
                    constructor(elem) {
                        this.elem = elem
                    }
                }
                const grid = []
                const gridElem = document.querySelector('.grid')
                const range = (n) => [...Array(n).keys()]
                Object.keys(synths).forEach((synthId) => {
                    const gridLine = []
                    const gridLineElem = document.createElement('div')
                    gridLineElem.classList.add('grid__line')
                    gridLineElem.innerHTML = /* html */ `
                        <div class="grid__synth-id">${synthId}</div>
                    `
                    for (let i = 0; i < 64; i++) {
                        const cellElem = document.createElement(synthId === 'marimba' ? 'select' : 'input')
                        cellElem.classList.add('grid__cell')
                        if (synthId === 'marimba') {
                            cellElem.innerHTML =
                                '<option value=""></option>' +
                                range(7)
                                    .map((i) => ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'].map((k) => `<option value="${k}${i}">${k}${i}</option>`))
                                    .join('')
                        } else {
                            cellElem.setAttribute('type', 'checkbox')
                        }
                        if (synthId === 'hihat' && i % 4 === 2) {
                            cellElem.setAttribute('checked', true)
                        }
                        if (synthId === 'snare' && (i % 8 === 4 || i === 62)) {
                            cellElem.setAttribute('checked', true)
                        }
                        if (synthId === 'kick' && i % 4 === 0) {
                            cellElem.setAttribute('checked', true)
                        }
                        const cell = new Cell(cellElem)
                        gridLine.push(cell)
                        gridLineElem.appendChild(cellElem)
                    }
                    grid.push(gridLine)
                    gridElem.appendChild(gridLineElem)
                })

                // Play
                const cellPlaySpeed = 60000 / 127 / 4
                let playTimers = []
                let endTimer = undefined
                let playing = false
                const playBtnElem = document.querySelector('.play-btn')
                const stop = () => {
                    if (typeof endTimer !== 'undefined') {
                        clearTimeout(endTimer)
                        endTimer = undefined
                    }
                    playTimers.forEach((timer) => {
                        clearTimeout(timer)
                    })
                    playTimers = []
                    document.querySelectorAll('.grid__cell').forEach((el) => (el.style.boxShadow = ''))
                    playBtnElem.innerText = '▶️'
                    playing = false
                }
                const play = () => {
                    const synthIds = Object.keys(synths)
                    const synthsArr = synthIds.map((synthId) => synths[synthId])
                    for (let y = 0; y < grid.length; y++) {
                        const synthId = synthIds[y]
                        for (let x = 0; x < grid[y].length; x++) {
                            const timer = window.setTimeout(() => {
                                document.querySelectorAll(`.grid__cell:not(:nth-of-type(${x + 1}))`).forEach((el) => (el.style.boxShadow = ''))
                                const cell = grid[y][x]
                                cell.elem.style.boxShadow = '0 0 10px #f00 inset'
                                const isValidMelodyNote = cell.elem.value.match(/^[A-G]#?\d+$/)
                                if (!cell.elem.checked && !isValidMelodyNote) {
                                    // Skip
                                } else if (synthId === 'hihat') {
                                    synthsArr[y].triggerAttackRelease('32n')
                                } else if (synthId === 'snare') {
                                    synthsArr[y].triggerAttackRelease('16n')
                                } else {
                                    synthsArr[y].triggerAttackRelease(isValidMelodyNote ? cell.elem.value : synthId === 'kick' ? 'C1' : 'C3', '32n')
                                }
                            }, cellPlaySpeed * x)
                            playTimers.push(timer)
                        }
                    }
                    endTimer = window.setTimeout(() => {
                        stop()
                    }, cellPlaySpeed * (64 + 1))
                    playBtnElem.innerText = '■'
                    playing = true
                }
                playBtnElem.addEventListener('click', () => {
                    if (playing) {
                        stop()
                    } else {
                        play()
                    }
                })
            })
        </script>
    </body>
</html>
