<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>hallway</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background-color: #000000;
            }
            *,
            *:after,
            *:before {
                box-sizing: border-box;
            }
            #frame {
                background-color: #ffffff;
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: calc(100vh / 3 * 2);
                height: 100vh;
                background-position: center;
                background-size: cover;
            }
            #control-form {
                color: #ffffff;
                background-color: rgba(0, 0, 0, 0.8);
                position: fixed;
                top: 0;
                left: 0;
            }
        </style>
    </head>
    <body>
        <div id="frame"></div>
        <form id="control-form">
            <input type="file" id="file-input" />
            <br />
            <span>Walk (0-1)</span>
            <br />
            <input type="range" name="walk-x" min="-0.5" max="0.5" value="0" step="0.01" />
            <input type="range" name="walk-z" min="0" max="1" value="0.5" step="0.01" />
            <br />
            <span>Plane (0-200m)</span>
            <br />
            <input type="range" name="floor-width" min="0" max="100" value="10" step="1" />
            <input type="range" name="floor-depth" min="0" max="200" value="200" step="1" />
            <br />
            <span>Target (50m)</span>
            <br />
            <input type="range" name="target-x" min="-25" max="25" value="0" step="1" />
            <input type="range" name="target-y" min="0.1" max="50" value="1.7" step="0.1" />
            <br />
            <span>Camera (50m)</span>
            <br />
            <input type="range" name="camera-x" min="-25" max="25" value="0" step="1" />
            <input type="range" name="camera-y" min="0.1" max="50" value="1.7" step="0.1" />
            <br />
            <input type="submit" value="Copy" />
        </form>
        <script src="https://unpkg.com/three@0.142.0/build/three.min.js"></script>
        <script>
            window.addEventListener('load', () => {
                const frameElem = document.querySelector('#frame')
                const renderer = new THREE.WebGLRenderer({ alpha: true })
                renderer.setSize(frameElem.clientWidth, frameElem.clientHeight)
                frameElem.appendChild(renderer.domElement)
                const scene = new THREE.Scene()
                const camera = new THREE.PerspectiveCamera(75, frameElem.clientWidth / frameElem.clientHeight, 0.1, 10000)

                const formElem = document.querySelector('#control-form')
                formElem.addEventListener('submit', (e) => {
                    e.preventDefault()
                    const text = JSON.stringify(Object.fromEntries(new FormData(formElem)))
                    window.alert(text)
                })
                document.querySelector('#file-input').addEventListener('change', (e) => {
                    const file = e.target.files[0]
                    if (!file) {
                        return
                    }
                    const reader = new FileReader()
                    reader.onloadend = () => {
                        frameElem.style.backgroundImage = 'url(' + reader.result + ')'
                    }
                    reader.readAsDataURL(file)
                })
                const rangeElems = document.querySelectorAll('#control-form input[type="range"]') || []
                rangeElems.forEach((el) => {
                    el.addEventListener('change', () => {
                        render()
                    })
                })
                let floor
                const hero = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshNormalMaterial())
                hero.position.set(0, 1, 0)
                scene.add(hero)

                const render = () => {
                    const formData = new FormData(formElem)
                    const walkX = Number(formData.get('walk-x'))
                    const walkZ = Number(formData.get('walk-z'))
                    const floorWidth = Number(formData.get('floor-width'))
                    const floorDepth = Number(formData.get('floor-depth'))
                    const cameraX = Number(formData.get('camera-x'))
                    const cameraY = Number(formData.get('camera-y'))
                    const targetX = Number(formData.get('target-x'))
                    const targetY = Number(formData.get('target-y'))
                    hero.position.x = floorWidth * walkX
                    hero.position.z = -1 * floorDepth * walkZ
                    if (floor) {
                        scene.remove(floor)
                    }
                    floor = new THREE.Mesh(new THREE.BoxGeometry(floorWidth, 0.1, -1 * floorDepth), new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5 }))
                    floor.position.set(0, 0, (-1 * floorDepth) / 2)
                    scene.add(floor)
                    camera.position.set(cameraX, cameraY, 0)
                    camera.lookAt(new THREE.Vector3(targetX, targetY, -1 * floorDepth))
                    renderer.render(scene, camera)
                }
                render()
            })
        </script>
    </body>
</html>
