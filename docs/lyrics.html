<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>lyrics</title>
        <style>
            *,
            *:after,
            *:before {
                box-sizing: border-box;
            }
            #input,
            #output {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                /* font-family: 'Courier New', Courier, monospace; */
                font-family: 'Times New Roman', Times, serif;
                border: 0;
                font-size: 32px;
                padding: 100px 200px;
                margin: 0;
                line-height: 1;
                letter-spacing: 0;
            }
            #input {
                z-index: 1;
                color: #fff;
                background-color: rgba(0, 0, 0, 1);
            }
            #output {
                z-index: 2;
                pointer-events: none;
                color: rgba(0, 0, 0, 0);
                background-color: rgba(0, 0, 0, 0);
            }
            @media screen and (max-width: 768px) {
                #input,
                #output {
                    font-size: 14px;
                    padding: 5px;
                }
            }
        </style>
    </head>
    <body>
        <textarea id="input" placeholder="Lyrics..."></textarea>
        <div id="output"></div>
        <script>
            window.addEventListener('load', () => {
                const projects = JSON.parse(localStorage.getItem('LYRICS_PROJECTS') || '{}')
                const currentProjectName = 'default'
                const inputElem = document.querySelector('#input')
                const outputElem = document.querySelector('#output')
                const eventNames = ['keydown', 'keyup']
                function esc(unsafe) {
                    return unsafe.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;')
                }
                function updateOutput(text) {
                    const matches = text.match(/([\u{3000}-\u{301C}\u{3041}-\u{3093}\u{309B}-\u{309E}]+|[\u{3000}-\u{301C}\u{30A1}-\u{30F6}\u{30FB}-\u{30FE}]+|[一-龠]+|[\w-]+)/gmu) || []
                    let html = esc(text)
                    const cnts = {}
                    matches.forEach((word, i) => {
                        if (!cnts[word]) {
                            cnts[word] = 0
                        }
                        cnts[word]++
                    })
                    Object.keys(cnts).forEach((word) => {
                        if (cnts[word] >= 2) {
                            html = html.replace(new RegExp(word, 'g'), `<font color="red">${word}</font>`)
                        }
                    })
                    outputElem.innerHTML = html.replace(/\n/g, '<br>')
                }
                eventNames.forEach((eventName) => {
                    inputElem.addEventListener(eventName, (e) => {
                        const text = e.target.value
                        projects[currentProjectName] = text
                        localStorage.setItem('LYRICS_PROJECTS', JSON.stringify(projects))
                        updateOutput(text)
                    })
                })
                inputElem.value = projects[currentProjectName] || ''
                updateOutput(inputElem.value)
            })
        </script>
    </body>
</html>
